interface:
  display_name: "ChatGPT Native Bridge"
  short_description: "MCP-first planning, review, research, UX critique, image direction, and diff review between Codex and visible ChatGPT."
  default_prompt: |
    Use chatgpt-native-bridge for this task.
    Decide whether this task needs ChatGPT-native planning, architecture critique,
    UX review, naming/copy review, research, image direction, or diff review.
    Prefer the MCP-first path with cgn mcp serve/config when ChatGPT can connect locally.
    If MCP is unavailable, create a cgn handoff fallback and tell the user what to paste or upload.

policy:
  allow_implicit_invocation: true
