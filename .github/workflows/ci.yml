name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      - name: Smoke test
        run: npm run smoke

      - name: MCP smoke test
        run: |
          node ./bin/cgn.js mcp config
          node ./bin/cgn.js mcp doctor

      - name: Pack dry run
        run: npm pack --dry-run
