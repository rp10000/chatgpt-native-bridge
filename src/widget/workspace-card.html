<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT Native Bridge</title>
  <style>
    :root {
      color-scheme: dark;
      --yellow: #ffc400;
      --ink: #171121;
      --panel: #241a34;
      --panel-2: #302344;
      --cream: #fff8cf;
      --muted: #cdbfda;
      --blue: #3d5afe;
      --pink: #ff4fa3;
      --green: #6ff7b2;
      --red: #ff6b6b;
      --line: rgba(255, 255, 255, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: transparent;
      color: var(--cream);
    }

    .card {
      overflow: hidden;
      border: 1px solid rgba(255, 196, 0, .36);
      border-radius: 8px;
      background:
        radial-gradient(circle at 14% 0%, rgba(255, 79, 163, .24), transparent 34%),
        linear-gradient(135deg, var(--ink), var(--panel) 58%, #3a203d);
      box-shadow: 0 16px 34px rgba(23, 17, 33, .26);
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 196, 0, .08);
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .project {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .status {
      align-self: start;
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--ink);
      background: var(--green);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .status.warn { background: var(--yellow); }
    .status.error { color: #fff; background: var(--red); }

    .body {
      padding: 14px 16px 16px;
    }

    .summary {
      margin: 0;
      color: #fff;
      font-size: 14px;
      line-height: 1.45;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      padding: 8px 9px;
      background: rgba(255, 255, 255, .07);
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
    }

    .metric-value {
      margin-top: 2px;
      color: var(--cream);
      font-size: 14px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    details {
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      background: rgba(255, 255, 255, .055);
    }

    summary {
      cursor: default;
      padding: 9px 10px;
      color: var(--cream);
      font-size: 13px;
      font-weight: 800;
    }

    ul {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0 10px 10px;
      list-style: none;
    }

    li {
      border-left: 3px solid var(--blue);
      border-radius: 6px;
      padding: 7px 9px;
      background: rgba(255, 255, 255, .07);
      color: var(--cream);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .next {
      margin-top: 12px;
      border-left: 3px solid var(--pink);
      border-radius: 7px;
      padding: 9px 10px;
      background: rgba(255, 79, 163, .1);
      color: #fff;
      font-size: 13px;
      line-height: 1.4;
    }

    .empty {
      color: var(--muted);
    }

    @media (max-width: 420px) {
      .metrics { grid-template-columns: 1fr; }
      .top { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <article class="card">
    <div class="top">
      <div>
        <h1 id="title">ChatGPT Native Bridge</h1>
        <div class="project" id="project">Waiting for tool result</div>
      </div>
      <div class="status" id="status">ready</div>
    </div>
    <div class="body">
      <p class="summary" id="summary">This card will update after ChatGPT calls a bridge tool.</p>
      <div class="metrics" id="metrics"></div>
      <div id="sections"></div>
      <div class="next" id="nextAction">No additional details.</div>
    </div>
  </article>

  <script>
    const titleEl = document.getElementById("title");
    const projectEl = document.getElementById("project");
    const statusEl = document.getElementById("status");
    const summaryEl = document.getElementById("summary");
    const metricsEl = document.getElementById("metrics");
    const sectionsEl = document.getElementById("sections");
    const nextEl = document.getElementById("nextAction");

    function renderFromStructuredContent(data) {
      const structured = extractStructuredContent(data);
      if (structured && structured.cardV2) {
        renderCardV2(structured.cardV2);
        return;
      }
      if (structured && structured.card) {
        renderCardV2(cardV2FromLegacy(structured.card));
        return;
      }
      renderCardV2(fallbackCardV2(structured));
    }

    function extractStructuredContent(value) {
      if (!value) return null;
      if (value.structuredContent) return value.structuredContent;
      if (value.result && value.result.structuredContent) return value.result.structuredContent;
      if (value.params && value.params.structuredContent) return value.params.structuredContent;
      if (value.params && value.params.result && value.params.result.structuredContent) return value.params.result.structuredContent;
      if (value.globals && value.globals.toolOutput) return extractStructuredContent(value.globals.toolOutput);
      if (value.globals && value.globals.toolResponseMetadata) return extractStructuredContent(value.globals.toolResponseMetadata);
      if (value.cardV2 || value.card || value.bridge_tool || value.bridge_title) return value;
      if (value._meta && (value._meta.cardV2 || value._meta.card)) return value._meta;
      return value;
    }

    function renderCardV2(cardV2) {
      const card = cardV2 || fallbackCardV2();
      titleEl.textContent = card.title || "Bridge result";
      projectEl.textContent = (card.project && card.project.name) || "Local workspace";
      statusEl.textContent = card.status || "ok";
      statusEl.className = "status " + (card.status || "");
      summaryEl.textContent = card.summary || "Tool result is available.";

      metricsEl.textContent = "";
      const metrics = Array.isArray(card.metrics) ? card.metrics.slice(0, 6) : [];
      for (const metric of metrics) {
        const box = document.createElement("div");
        box.className = "metric";
        const label = document.createElement("div");
        label.className = "metric-label";
        label.textContent = metric.label || "Metric";
        const value = document.createElement("div");
        value.className = "metric-value";
        value.textContent = metric.value === undefined ? "n/a" : String(metric.value);
        box.append(label, value);
        metricsEl.append(box);
      }

      sectionsEl.textContent = "";
      const sections = Array.isArray(card.sections) ? card.sections.slice(0, 5) : [];
      if (!sections.length) {
        sectionsEl.append(buildSection("Details", ["No additional details were returned by this tool."]));
      } else {
        for (const section of sections) {
          sectionsEl.append(buildSection(section.title || "Details", section.items || []));
        }
      }

      nextEl.textContent = card.nextAction || "Ask ChatGPT to call bridge_card_test if this card stays empty.";
      if (window.openai && typeof window.openai.notifyIntrinsicHeight === "function") {
        window.openai.notifyIntrinsicHeight();
      }
    }

    function buildSection(title, items) {
      const details = document.createElement("details");
      details.open = true;
      const summary = document.createElement("summary");
      summary.textContent = title;
      const list = document.createElement("ul");
      const values = Array.isArray(items) && items.length ? items.slice(0, 8) : ["No additional details were returned by this tool."];
      for (const value of values) {
        const item = document.createElement("li");
        if (!value) item.className = "empty";
        item.textContent = String(value || "No additional details were returned by this tool.");
        list.append(item);
      }
      details.append(summary, list);
      return details;
    }

    function cardV2FromLegacy(card) {
      return {
        version: 2,
        kind: card.kind || "result",
        status: card.status || "ok",
        title: card.title || "Bridge result",
        project: { name: card.projectName || "Local workspace" },
        summary: card.summary || "Tool result is available.",
        metrics: [
          card.command ? { label: "Command", value: card.command } : null,
          card.exitCode !== undefined && card.exitCode !== null ? { label: "Exit", value: String(card.exitCode) } : null,
          card.inboxId ? { label: "Report", value: card.inboxId } : null
        ].filter(Boolean),
        sections: [{ title: "Details", items: [...(card.changedFiles || []), ...(card.items || [])].slice(0, 8) }],
        nextAction: "Review the result and continue in ChatGPT."
      };
    }

    function fallbackCardV2(data) {
      const keys = data && typeof data === "object" ? Object.keys(data).filter((key) => key !== "_meta") : [];
      return {
        version: 2,
        kind: "diagnostic",
        status: "warn",
        title: "Bridge result",
        project: { name: "Local workspace" },
        summary: keys.length
          ? "Tool data arrived, but it did not include a bridge card payload."
          : "Waiting for a real bridge tool result.",
        metrics: keys.length ? [{ label: "Keys", value: String(keys.length) }] : [],
        sections: [{
          title: "Empty Card Check",
          items: keys.length
            ? keys.slice(0, 8).map((key) => key + ": " + shortValue(data[key]))
            : [
              "Ask ChatGPT to call bridge_card_test.",
              "If bridge_card_test renders, refresh the app/tool metadata and call the real tool again.",
              "If it still stays empty, the selected ChatGPT mode may not be delivering Apps tool results."
            ]
        }],
        nextAction: "Ask ChatGPT to call bridge_card_test, then call open_workspace."
      };
    }

    function shortValue(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "string") return value.slice(0, 90);
      if (Array.isArray(value)) return value.length + " item(s)";
      if (typeof value === "object") return "object";
      return String(value);
    }

    window.addEventListener("openai:set_globals", (event) => {
      renderFromStructuredContent(event.detail && event.detail.globals);
    }, { passive: true });

    window.addEventListener("message", (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (!message || message.jsonrpc !== "2.0") return;
      if (message.method === "ui/notifications/tool-result") {
        renderFromStructuredContent(message.params || message);
      }
    }, { passive: true });

    renderFromStructuredContent(window.openai && (window.openai.toolOutput || window.openai.toolResponseMetadata));
  </script>
</body>
</html>
