<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT Native Bridge</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <img class="avatar" src="../assets/avatar.png" alt="">
      <div class="title-block">
        <h1>ChatGPT Native Bridge</h1>
        <p id="projectPath">正在读取项目...</p>
      </div>
    </header>

    <section class="status-grid" aria-label="当前状态">
      <div class="tile">
        <span>连接</span>
        <strong id="bridgeState">未连接</strong>
      </div>
      <div class="tile">
        <span>回复</span>
        <strong id="replyState">暂无</strong>
      </div>
      <div class="tile">
        <span>Codex</span>
        <strong id="codexState">检查中</strong>
      </div>
      <div class="tile">
        <span>Pro</span>
        <strong id="proState">辅助</strong>
      </div>
    </section>

    <section class="panel primary">
      <p class="eyebrow">主流程</p>
      <h2 id="nextActionTitle">连接 ChatGPT</h2>
      <p id="nextActionText">先连接 ChatGPT 工具。连接后，让 ChatGPT 复核当前项目并写回 Codex。</p>

      <div class="actions three-step">
        <button id="connectChatGPT">连接 ChatGPT</button>
        <button class="secondary" id="copyChatGPTPrompt">开始复核</button>
        <button class="ghost" id="copyCodex">交给 Codex</button>
      </div>
    </section>

    <section class="panel">
      <details>
        <summary>Pro 辅助规划</summary>
        <p class="hint">Pro 不能直接读取本地项目，只能根据客户端复制过去的上下文做规划。</p>
        <label for="taskInput">给 Pro 的任务</label>
        <textarea id="taskInput">基于下面的项目上下文，给 Codex 一个简洁、可执行的下一步计划。如果上下文不足，请明确说上下文不足。</textarea>
        <div class="actions">
          <button class="secondary" id="proPlan">复制 Pro 上下文</button>
          <button class="ghost" id="startProWatch">等待 Pro 回复</button>
        </div>

        <label for="manualReply">手动粘贴 Pro 回复</label>
        <textarea id="manualReply"></textarea>
        <div class="actions">
          <button class="ghost" id="manualImport">导入 Pro 回复</button>
          <button class="ghost" id="openChatGPT">打开 ChatGPT</button>
        </div>
      </details>
    </section>

    <section class="panel">
      <details>
        <summary>诊断</summary>
        <div class="actions">
          <button class="ghost" id="selectProject">选择项目</button>
        </div>
        <pre id="diagnostics">准备就绪。</pre>
      </details>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
