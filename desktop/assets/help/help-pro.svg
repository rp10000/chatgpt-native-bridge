  <text x="184" y="126" fill="#fff8cf" font-family="Inter, Segoe UI, Arial" font-size="34" font-weight="800">4. Thinking vs Pro</text>
  <text x="184" y="164" fill="#d8cce8" font-family="Inter, Segoe UI, Arial" font-size="18">Thinking can use MCP tools. Pro may need packaged context if tools are unavailable.</text>
  <rect x="118" y="214" width="310" height="140" rx="12" fill="#1d2730" stroke="rgba(255,255,255,.16)"/><text x="140" y="256" fill="#fff8cf" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="700">Thinking + MCP</text>
<text x="146" y="296" fill="#d8cce8" font-family="Inter, Segoe UI, Arial" font-size="18">Direct project tools</text>
<rect x="532" y="214" width="310" height="140" rx="12" fill="#302044" stroke="rgba(255,255,255,.16)"/><text x="554" y="256" fill="#fff8cf" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="700">Pro Planning</text>
<text x="560" y="296" fill="#d8cce8" font-family="Inter, Segoe UI, Arial" font-size="18">Packaged context only</text>
